name: Build APK

on:
  push:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Install Gradle
      run: sudo apt install gradle -y

    - name: Build
      run: gradle assembleDebug

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: "**/*.apk"
