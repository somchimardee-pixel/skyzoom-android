plugins {
    id 'com.android.application'
}

android {
    namespace "com.skyzoom.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.skyzoom.app"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation 'com.google.android.gms:play-services-maps:18.2.0'
}
